name: Deploy Clipsio

on:
  push:
    branches: [ main ] # Срабатывает при пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/clipsio
            git pull origin main
            
            # Backend
            cd server
            npm install
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart index.js || pm2 start index.js --name "clipsio-api"
            
            # Frontend
            cd ../client
            npm install
            npm run build
            
            # Очищаем папку, которую раздает Nginx
            sudo rm -rf /var/www/clipsio/*
            # Копируем свежий билд из папки проекта в папку Nginx
            sudo cp -r dist/* /var/www/clipsio/
            
            # (Опционально) Перезапускаем Nginx, чтобы сбросить кеш
            sudo systemctl restart nginx
