name: Deploy Clipsio

on:
  push:
    branches: [ main ] # Срабатывает при пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e # Остановить скрипт при любой ошибке
            
            cd ~/clipsio
            
            # Принудительно обновляем код, игнорируя локальные изменения на сервере
            git fetch origin main
            git reset --hard origin/main
            
            # Backend
            cd server
            npm install
            npx prisma generate
            
            # Если миграции застряли, 'migrate deploy' может упасть. 
            # В этом случае один раз нужно будет починить вручную (см. ниже)
            npx prisma migrate deploy
            
            # Перезапуск API. Рекомендую использовать имя процесса, а не файл
            pm2 restart clipsio-api || pm2 start index.js --name "clipsio-api"
            
            # Frontend
            cd ../client
            npm install
            npm run build
            
            # Удаляем всё старое принудительно
            sudo rm -rf /var/www/clipsio/*
            # Копируем новое
            sudo cp -r dist/* /var/www/clipsio/
            # Устанавливаем права, чтобы Nginx (пользователь www-data) мог читать файлы
            sudo chown -R www-data:www-data /var/www/clipsio
            sudo chmod -R 755 /var/www/clipsio
